version: '3.9'

services:

  db:
    image: postgres:15-alpine
    container_name: gep_db
    environment:
      POSTGRES_DB: gep_db
      POSTGRES_USER: gep_user
      POSTGRES_PASSWORD: gep_pass123
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gep_user -d gep_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: gep_backend
    command: >
      sh -c "python manage.py migrate &&
             python manage.py seed_data &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app
      - ./data:/data
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings
      - DATABASE_URL=postgresql://gep_user:gep_pass123@db:5432/gep_db

  frontend:
    build: ./frontend
    container_name: gep_frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - REACT_APP_API_URL=http://localhost:8000/api
    stdin_open: true

volumes:
  pgdata: